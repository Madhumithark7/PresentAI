<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PresentAI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>⚡ PresentAI</h1>
    <p>Create AI-style presentations instantly</p>

    <input type="text" id="topic" placeholder="Enter Topic (e.g. AI)" />
    <input type="text" id="audience" placeholder="Enter Audience (e.g. Students)" />
    <input type="number" id="slides" placeholder="Number of Slides" />

    <button onclick="generatePresentation()">Generate Presentation</button>

    <div id="output"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
