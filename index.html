<!DOCTYPE html>
<html>
<head>
    <h1>🤖 PresentAI</h1>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        

        <div class="form-box">

            <input
            type="text"
            id="topic"
            placeholder="Enter Presentation Topic">

            <input
            type="text"
            id="audience"
            placeholder="Audience">

            <input
            type="number"
            id="slidesCount"
            placeholder="Number of Slides">

            <button onclick="generateSlides()">
                Generate Presentation
            </button>

        </div>

        <div id="result"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
